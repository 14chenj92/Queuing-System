<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badminton Registration</title>
  <link rel="stylesheet" href="reset.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="registration.css" />
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function () {
      emailjs.init({ publicKey: "mvTBtzs6TShj8eUpt" });
    })();
  </script>
  <style>
    body {
      overflow: auto;
      height: auto;
      min-height: 100vh;
      padding: 48px 20px 64px;
      justify-content: flex-start;
      gap: 24px;
    }

    .reg-card {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07), 0 1px 4px rgba(0, 0, 0, 0.04);
      padding: 44px 56px;
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .reg-step {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .reg-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a1a;
      margin: 0 0 8px 0;
      text-align: left;
      letter-spacing: -0.01em;
    }

    .reg-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .reg-field label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      text-transform: capitalize;
      letter-spacing: 0.01em;
    }

    .reg-field input {
      width: 100%;
      box-sizing: border-box;
      margin: 0;
      font-size: 15px;
    }

    .reg-card form {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
    }

    .reg-card button[type="submit"] {
      width: 50%;
      margin-top: 4px;
      align-self: center;
    }

    .waiver-label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      text-transform: capitalize;
      letter-spacing: 0.01em;
    }

    .waiver-box {
      width: 100%;
      height: 360px;
      overflow-y: scroll;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      background: #fafafa;
    }

    .waiver-box img {
      width: 100%;
      display: block;
    }

    .waiver-disclaimer {
      font-size: 0.85rem;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
      margin: 0;
    }

    .waiver-disclaimer strong {
      color: #374151;
    }

    #message, #password {
      font-family: var(--main-font);
      font-size: 15px;
      text-align: center;
    }

    #password {
      font-weight: 700;
      color: #15803d;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <button onclick="goToHome()" class="back-button">⬅ Back</button>

  <h2>Badminton Registration</h2>

  <!-- Step 1 -->
  <div class="reg-card">
    <p class="reg-step">Step 1</p>
    <h3>Your Information</h3>
    <form id="emailForm">
      <div class="reg-field">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="reg-field">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" pattern="[A-Za-z]+" title="First Name must only contain letters" placeholder="First name" required />
      </div>
      <div class="reg-field">
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" pattern="[A-Za-z]+" title="Last Name must only contain letters" placeholder="Last name" required />
      </div>
      <button type="submit">Send Email</button>
    </form>
  </div>

  <!-- Step 2 -->
  <div class="reg-card">
    <p class="reg-step">Step 2</p>
    <h3>Verify &amp; Sign Waiver</h3>
    <form id="verifyForm">
      <div class="reg-field">
        <label for="code">Enter Verification Code:</label>
        <input type="text" id="code" name="code" placeholder="Enter code from email" required />
      </div>
      <label class="waiver-label">Waiver and Release Agreement Sample:</label>
      <div class="waiver-box">
        <img src="./waivers/21BCWaiver_Page1.png" alt="Waiver Page 1" />
        <img src="./waivers/21BCWaiver_Page2.png" alt="Waiver Page 2" />
      </div>
      <button type="submit">Verify</button>
      <p class="waiver-disclaimer">
        By clicking "Verify", I acknowledge that I have read, understood, and agree to the terms stated in the
        <strong>Gym Waiver and Release Agreement</strong>.
      </p>
    </form>
  </div>

  <p id="message"></p>
  <p id="password"></p>

  <script src="function.js"></script>
  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.8.0/dist/sweetalert2.all.min.js"></script>
  <script>
    document.getElementById("emailForm").addEventListener("submit", function (event) {
      event.preventDefault();
      const form = event.target;
      if (form.checkValidity()) {
        generatePassword();
      } else {
        form.reportValidity();
      }
    });

    function goToHome() {
      window.location.href = "main.html";
    }
  </script>
</body>
</html>
